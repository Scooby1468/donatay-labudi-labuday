spring:
  liquibase:
    enabled: true
    url: ${SPRING_LIQUIBASE_URL:jdbc:postgresql://localhost:5435/donation_db}
    user: ${SPRING_LIQUIBASE_USER:donation_local}
    password: ${SPRING_LIQUIBASE_PASSWORD:local_dev_password_change_me}

  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5435/donation_db}
    username: ${SPRING_R2DBC_USERNAME:donation_local}
    password: ${SPRING_R2DBC_PASSWORD:local_dev_password_change_me}

jwt:
  secret: ${JWT_SECRET:local-development-shared-jwt-secret-at-least-32-characters}
  issuer: ${JWT_ISSUER:donatay-auth-service}
  expiration: ${JWT_EXPIRATION_SECONDS:900}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
