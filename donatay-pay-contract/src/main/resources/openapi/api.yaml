openapi: 3.0.3
info:
  title: Donatay User Data Service API
  description: API сервиса пользовательских и публичных профильных данных Donatay. Auth/MFA/JWT endpoints вынесены в auth-service.
  version: 1.2.0
paths:
  /api/profile:
    get:
      tags:
        - Profile
      summary: Получить профиль текущего пользователя
      operationId: getProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Профиль успешно получен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          description: Нет валидного access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Профиль не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Profile
      summary: Редактировать профильные данные
      operationId: updateProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Профиль успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Нет валидного access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Профиль не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/version:
    get:
      tags:
        - Version
      summary: Получить информацию о версии сервиса
      operationId: getVersion
      responses:
        '200':
          description: Информация о версии
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppVersionResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserProfileResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        uuid:
          type: string
          format: uuid
        email:
          type: string
          format: email
        nickname:
          type: string
        avatarUrl:
          type: string
        headerUrl:
          type: string
        phoneNumber:
          type: string

    UpdateProfileRequest:
      type: object
      properties:
        nickname:
          type: string
          maxLength: 100
        avatarUrl:
          type: string
          maxLength: 500
        headerUrl:
          type: string
          maxLength: 500
        phoneNumber:
          type: string
          maxLength: 50

    AppVersionResponse:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        commitHash:
          type: string
        buildTime:
          type: string

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
